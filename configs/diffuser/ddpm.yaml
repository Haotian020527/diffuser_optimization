name: DDPM
timesteps: 100
schedule_cfg:
  beta: [0.0001, 0.01]
  beta_schedule: 'linear'
  s: 0.008
lr: ${task.lr}

sample:
  converage:
    optimization: true
    planning: true
    ksteps: 1 # If it's too small, the agent's trajectory will skip frames
  fine_tune:
    optimization: true
    planning: true
    timesteps: 50
    ksteps: 1 # If it's too small, the agent's trajectory will skip frames
  amogg:
    enabled: false
    kappa: 10.0
    eps: 1e-8
    use_variance: true
    task_scale: 1.0
    collision_scale: 1.0
    detach_output: true

rand_t_type: 'half' # 'half' or 'all'
loss_type: 'l2' # 'l1' or 'l2'
